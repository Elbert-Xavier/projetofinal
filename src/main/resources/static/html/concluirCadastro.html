<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestoretech - Concluir Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/concluirCadastro.css">
    <script type="text/javascript" src="../js/concluirCadastro.js"></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="card w-100 border-0 p-4 rounded-4 shadow-sm" style="max-width: 700px; margin: 20px;">
        
        <div class="text-center mb-4">
            <div class="logo-box mx-auto mb-3">G</div>
            <h1 class="h4 fw-bold text-dark-blue mb-1">Seja bem-vindo ao Gestoretech</h1>
            <p class="text-muted small mb-0">Confirme suas informações e altere sua senha temporária para finalizar o cadastro.</p>
        </div>

        <hr class="text-muted opacity-25 mb-4">

        <form id="formConcluirCadastro">
            <div class="row g-4">
                
                <div class="col-12">
                    <h6 class="fw-bold text-dark-blue mb-1"><i class="fa-solid fa-user-check me-2 text-secondary"></i>Seus Dados</h6>
                </div>

                <div class="col-md-12">
                    <label for="nome" class="form-label text-muted small fw-semibold">Nome Completo</label>
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="col-md-6">
                    <label for="cpf" class="form-label text-muted small fw-semibold">CPF</label>
                    <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" maxlength="14" required oninput="mascaraCPF(this)">
                </div>

                <div class="col-md-6">
                    <label for="telefone" class="form-label text-muted small fw-semibold">Telefone / Ramal</label>
                    <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000" required oninput="mascaraCelular(this)">
                </div>

                <div class="col-md-6">
                    <label for="cargo" class="form-label text-muted small fw-semibold">Cargo / Função</label>
                    <input type="text" class="form-control" id="cargo" placeholder="Ex: Analista de Suporte" required>
                </div>

                <div class="col-md-6">
                    <label for="dataCadastro" class="form-label text-muted small fw-semibold">Data de Ativação da Conta</label>
                    <input type="date" class="form-control bg-light text-muted" id="dataCadastro" readonly>
                </div>


                <div class="col-12 mt-5">
                    <h6 class="fw-bold text-dark-blue mb-1"><i class="fa-solid fa-key me-2 text-secondary"></i>Substituir Senha Temporária</h6>
                    <p class="text-muted font-xs mb-0">Defina sua nova credencial de acesso segura.</p>
                </div>

                <div class="col-md-6">
                    <label for="senha" class="form-label text-muted small fw-semibold">Nova Senha Definitiva</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="senha" placeholder="Crie uma senha forte" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="confirmarSenha" class="form-label text-muted small fw-semibold">Confirmar Nova Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-check-double"></i></span>
                        <input type="password" class="form-control" id="confirmarSenha" placeholder="Repita a senha definida" required>
                    </div>
                </div>

            </div>

            <div class="mt-5 pt-4 border-top text-end">
                <button type="submit" class="btn btn-purple px-5 py-2.5 fw-semibold rounded-3 w-100 w-sm-auto">
                    <i class="fa-solid fa-circle-check me-2"></i>Concluir e Acessar o Sistema
                </button>
            </div>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
