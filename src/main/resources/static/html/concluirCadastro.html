<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor&amp;Tech - Concluir Cadastro</title>
    
    <!-- 1. Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 2. Ícones e Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <!-- 3. Nossos Estilos -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-4 py-md-5">

    <div class="card w-100 border-0 p-4 p-sm-5 rounded-4 shadow-sm mx-3" style="max-width: 750px;">
        
        <!-- Topo da Boas-vindas com a Logo Padronizada -->
        <div class="text-center mb-4">
            <!-- th:src e estilos atualizados para a logo oficial unificada -->
            <img th:src="@{/img/logo-icon.png}" src="../img/logo-icon.png" alt="Gestor&amp;Tech" style="height: 35px; width: auto; object-fit: contain; display: block; margin: 0 auto 1rem auto;">
            <h1 class="h4 fw-bold mb-1" style="color: var(--dark-blue);">Seja bem-vindo ao Gestor&amp;Tech</h1>
            <p class="text-muted small mb-0">Confirme suas informações e altere sua senha temporária para finalizar o seu cadastro.</p>
        </div>

        <hr class="text-muted opacity-25 mb-4">

        <!-- Formulário de Ativação -->
        <form id="formConcluirCadastro">
            <div class="row g-4">
                
                <div class="col-12">
                    <h6 class="fw-bold mb-1" style="color: var(--dark-blue);">
                        <i class="fa-solid fa-user-check me-2 text-muted"></i>Seus Dados Cadastrais
                    </h6>
                </div>

                <div class="col-12">
                    <label for="nome" class="form-label text-muted small fw-semibold mb-1">Nome Completo</label>
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="col-sm-6">
                    <label for="cpf" class="form-label text-muted small fw-semibold mb-1">CPF</label>
                    <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" maxlength="14" required oninput="mascaraCPF(this)">
                </div>

                <div class="col-sm-6">
                    <label for="telefone" class="form-label text-muted small fw-semibold mb-1">Telefone / Ramal</label>
                    <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000" required oninput="mascaraCelular(this)">
                </div>

                <div class="col-sm-6">
                    <label for="cargo" class="form-label text-muted small fw-semibold mb-1">Cargo / Função</label>
                    <input type="text" class="form-control" id="cargo" placeholder="Ex: Analista de Suporte" required>
                </div>

                <div class="col-sm-6">
                    <label for="dataCadastro" class="form-label text-muted small fw-semibold mb-1">Data de Ativação da Conta</label>
                    <input type="date" class="form-control bg-light text-muted" id="dataCadastro" readonly>
                </div>

                <!-- Seção: Nova Credencial -->
                <div class="col-12 mt-5">
                    <h6 class="fw-bold mb-1" style="color: var(--dark-blue);">
                        <i class="fa-solid fa-key me-2 text-muted"></i>Substituir Senha Temporária
                    </h6>
                    <p class="text-muted font-xs mb-0">Defina sua nova credencial de acesso definitiva e segura.</p>
                </div>

                <div class="col-md-6">
                    <label for="senha" class="form-label text-muted small fw-semibold mb-1">Nova Senha Definitiva</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="senha" placeholder="Crie uma senha forte" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="confirmarSenha" class="form-label text-muted small fw-semibold mb-1">Confirmar Nova Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-check-double"></i></span>
                        <input type="password" class="form-control" id="confirmarSenha" placeholder="Repita a senha definida" required>
                    </div>
                </div>

            </div>

            <!-- Botão de Envio Responsivo -->
            <div class="mt-5 pt-4 border-top text-end">
                <button type="button" class="btn btn-purple px-5 py-2.5 fw-semibold rounded-3 w-100 w-sm-auto" onclick="concluirCadastro()">
                    <i class="fa-solid fa-circle-check me-2"></i>Concluir e Acessar o Sistema
                </button>
            </div>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="../js/concluirCadastro.js"></script>
</body>
</html>
