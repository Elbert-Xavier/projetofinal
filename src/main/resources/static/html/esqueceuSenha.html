<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - Gestor&amp;Tech</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/login.css">
    
    <script type="text/javascript" src="../js/esqueceuSenha.js"></script>
</head>
<body>

    <div class="main-container">
        <div class="left-side">
            <div class="brand">
                <div class="logo-box d-flex align-items-center justify-content-center bg-white text-primary fw-bold rounded">G</div>
                <h2>Gestor&amp;Tech</h2>
            </div>
            <div class="content">
                <p class="mb-0">Sistema completo para gestão técnica e administrativa da sua empresa.</p>
            </div>
        </div>

        <div class="right-side">
            <div class="form-wrapper">
                <h1>Nova Senha</h1>
                <p class="subtitle">Escolha uma senha forte de acesso para a sua conta.</p>

                <form onsubmit="return false;"> 
                    <div class="input-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Nova Senha" id="senha" required>
                        <i class="fa-regular fa-eye-slash eye-toggle" onclick="revelar();"></i>
                    </div>

                    <div class="input-container">
                        <i class="fa-solid fa-circle-check"></i>
                        <input type="password" placeholder="Confirme a Nova Senha" id="confirmarSenha" required>
                        <i class="fa-regular fa-eye-slash eye-toggle" onclick="revelarConfirmacao();"></i>
                    </div>

                    <button type="submit" class="btn-entrar text-uppercase" onclick="salvarSenha();">Salvar Nova Senha</button>
                    
                    <div class="register-link">
                        <p class="mb-0">
                            Lembrou a senha antiga? 
                            <a href="http://192.168.10.22:8010/login.html" class="ms-1">Fazer Login</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
