<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Gestor&Tech</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="../js/esqueceuSenha.js"></script>
</head>
<body>

    <div class="main-container">
        <div class="left-side">
            <div class="brand">
                <div class="logo-box">G</div>
                <h2>Gestor&Tech</h2>
            </div>
            <div class="content">
                <p>Sistema completo para gestão técnica e administrativa da sua empresa.</p>
                <div class="illustration-box">
                    <div class="css-illustration">
   						<div class="chart-bar bar-1"></div>
    					<div class="chart-bar bar-2"></div>
    					<div class="chart-bar bar-3"></div>
					</div>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="form-wrapper">
                <h1>Recuperar Senha</h1>
                <p class="subtitle">Insira o seu e-mail cadastrado para receber as instruções de recuperação.</p>

                <form onsubmit="return false;"> 
                    <div class="input-container">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" placeholder="E-mail cadastrado" id="emailRecuperacao">
                    </div>

                    <button type="button" class="btn-entrar" onclick="enviarCodigo();" id="buttonRecuperacao">ENVIAR LINK</button>
                    
                    <div class="register-link">
                        <p>Lembrou a senha? <a href="http://localhost:8000/login.html"><i class="fa-solid fa-arrow-left" style="font-size: 0.8rem; margin-right: 4px;"></i> Voltar para o Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
