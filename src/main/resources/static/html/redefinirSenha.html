<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Gestor&amp;Tech</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" th:href="@{/css/base.css}" href="../css/base.css">
    <link rel="stylesheet" th:href="@{/css/login.css}" href="../css/login.css?v=1.6">
    <script type="text/javascript" th:src="@{/js/redefinirSenha.js}" src="../js/redefinirSenha.js"></script>
</head>
<body>

    <div class="main-container">
        <div class="right-side">
            <div class="form-wrapper">
                
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div style="width: 52px; height: 52px; background-color: #0052ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem auto; box-shadow: 0 4px 12px rgba(0, 82, 255, 0.2);">
                        <span style="color: #ffffff; font-family: 'IBM Plex Sans', sans-serif; font-size: 1.8rem; font-weight: 700; line-height: 1;">G</span>
                    </div>
                    <h1 style="font-size: 1.8rem; font-weight: 700; color: #0f172a; margin-bottom: 0.25rem; letter-spacing: -0.5px;">Gestor&amp;Tech</h1>
                    <p class="subtitle" style="margin-bottom: 0; font-size: 0.9rem;">Escolha uma senha forte de acesso para a sua conta.</p>
                </div>

                <hr style="border: 0; border-top: 1px solid #e2e8f0; margin-bottom: 1.75rem;">

                <form onsubmit="return false;"> 
                    
                    <div class="input-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Nova Senha" id="novaSenha" required>
                        <i class="fa-regular fa-eye-slash eye-toggle" id="toggleNovaSenha" onclick="revelarSenha('novaSenha', 'toggleNovaSenha');"></i>
                    </div>

                    <div class="input-container">
                        <i class="fa-solid fa-circle-check"></i>
                        <input type="password" placeholder="Confirme a Nova Senha" id="confirmarSenha" required>
                        <i class="fa-regular fa-eye-slash eye-toggle" id="toggleConfirmarSenha" onclick="revelarSenha('confirmarSenha', 'toggleConfirmarSenha');"></i>
                    </div>

                    <button type="button" class="btn-entrar" onclick="novasenha()" style="margin-top: 10px;">SALVAR NOVA SENHA</button>
                    
                    <div class="register-link">
                        <p>Lembrou a senha antiga? <a th:href="@{/login}" href="../login.html">Fazer Login</a></p>
                    </div>
                </form>
                
            </div>
        </div>
    </div>

</body>
</html>
