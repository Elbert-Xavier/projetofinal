<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Gestor&Tech</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="../js/redefinirSenha.js"></script>
</head>
<body>

    <div class="main-container">
        <div class="left-side">
            <div class="brand">
                <div class="logo-box">G</div>
                <h2>Gestor&Tech</h2>
            </div>
            <div class="content">
                <p>Sistema completo para gestão técnica e administrativa da sua empresa.</p>
                <div class="illustration-box">
                    <div class="css-illustration">
   						<div class="chart-bar bar-1"></div>
    					<div class="chart-bar bar-2"></div>
    					<div class="chart-bar bar-3"></div>
					</div>
                </div>
            </div>
        </div>

        <div class="right-side">
            <div class="form-wrapper">
                <h1>Nova Senha</h1>
                <p class="subtitle">Escolha uma senha forte de acesso para a sua conta.</p>

                <form onsubmit="return false;"> 
                    
                    <div class="input-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Nova Senha" id="novaSenha" required>
                        <i class="fa-regular fa-eye-slash eye-toggle" id="toggleNovaSenha" onclick="revelarSenha('novaSenha', 'toggleNovaSenha');"></i>
                    </div>

                    <div class="input-container">
                        <i class="fa-solid fa-circle-check"></i>
                        <input type="password" placeholder="Confirme a Nova Senha" id="confirmarSenha" required>
                        <i class="fa-regular fa-eye-slash eye-toggle" id="toggleConfirmarSenha" onclick="revelarSenha('confirmarSenha', 'toggleConfirmarSenha');"></i>
                    </div>

                    <button type="button" class="btn-entrar" onclick="novasenha()" style="margin-top: 10px;">SALVAR NOVA SENHA</button>
                    
                    <div class="register-link">
                        <p>Lembrou a senha antiga? <a href="http://localhost:8000/login.html">Fazer Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
