<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor&amp;Tech - Consultar Chamados</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/clienteMeusEquipamentos.css">
</head>
<body>

    <div class="dashboard-container" id="pageContainer">
        
        <aside class="sidebar">
            <div class="logo-area">
                <img src="../assets/logo-icon.png" alt="Gestor&amp;Tech" class="logo-box">
                <div class="logo-title-group">
                    <span class="logo-text">Gestor&amp;Tech</span>
                    <span class="logo-subtext">Área do Técnico</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="tecnicoDashboard.html" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="tecnicoMeusChamados.html" class="nav-item active"><i class="fa-regular fa-file-lines"></i> Consultar Chamados</a>
                <a href="tecnicoHistoricoEquipamentos.html" class="nav-item"><i class="fa-solid fa-wrench"></i> Histórico Equipamentos</a>
                
                <div class="sidebar-footer">
                    <a href="../login.html" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            
            <div class="d-flex d-lg-none align-items-center justify-content-between bg-white border-bottom p-3 w-100 shadow-sm">
                <div class="d-flex align-items-center gap-2">
                    <img src="../assets/logo-icon.png" alt="Logo" style="width: 32px; height: 32px;">
                    <span class="fw-bold" style="color: var(--dark-blue);">Gestor&amp;Tech</span>
                </div>
                <button class="btn btn-light border-0" id="btnMenuMobile">
                    <i class="fa-solid fa-bars fs-4" style="color: var(--dark-blue);"></i>
                </button>
            </div>

            <div class="sidebar-overlay" id="overlayMenuMobile"></div>

            <div class="content-wrapper p-4 p-md-5">
                
                <div class="card border-0 shadow-sm p-4 p-md-5 mx-auto" style="max-width: 900px;">
                    
                    <div class="d-flex align-items-center gap-3 mb-5 mt-2 mt-lg-0">
                        <div class="d-flex align-items-center justify-content-center rounded-circle flex-shrink-0" style="width: 46px; height: 46px; background-color: var(--bs-primary-bg-subtle, #eaedfe); color: var(--bs-primary);">
                            <i class="fa-regular fa-file-lines fs-5"></i>
                        </div>
                        <div>
                            <h1 class="h4 fw-bold mb-1" style="color: var(--dark-blue);">Consultar Chamados</h1>
                            <p class="text-muted small mb-0">Gerencie e atualize os chamados técnicos sob sua responsabilidade.</p>
                        </div>
                    </div>

                    <div class="row g-3 mb-5 bg-light p-3 border rounded">
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold text-muted mb-1"><i class="fa-solid fa-filter me-1"></i> Filtrar por Status</label>
                            <select class="form-select" id="filtroCriterio">
                                <option value="todos" selected>Todos os meus</option>
                                <option value="aberto">Abertos / Em Andamento</option>
                                <option value="finalizado">Finalizados por mim</option>
                                <option value="alta">Alta Prioridade</option>
                            </select>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label small fw-semibold text-muted mb-1"><i class="fa-solid fa-magnifying-glass me-1"></i> Buscar Chamado</label>
                            <input type="text" class="form-control" id="filtroBusca" placeholder="Buscar por título, cliente ou número do chamado...">
                        </div>
                    </div>

                    <div class="list-group list-group-flush border-0" id="listaChamadosContainer">
                        <div class="text-center text-muted p-5 bg-light rounded border border-dashed">
                            <i class="fa-solid fa-circle-notch fa-spin me-2 fs-4 mb-3"></i> 
                            <p class="mb-0 fw-medium">Carregando chamados...</p>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="chamadoModal" tabindex="-1" aria-labelledby="chamadoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content border-0 shadow">
                
                <div class="modal-header border-bottom">
                    <div>
                        <span class="text-primary small fw-bold text-uppercase">Gestão de OS</span>
                        <h5 class="modal-title fw-bold" id="chamadoModalLabel" style="color: var(--dark-blue);">Detalhes do Chamado</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body p-3 p-sm-4">
                    
                    <div class="row g-3 mb-4 bg-light p-3 rounded border">
                        <div class="col-sm-4">
                            <label class="text-muted small fw-semibold text-uppercase d-block mb-1">Número</label>
                            <span class="font-monospace fw-bold" id="modalIdChamado" style="color: var(--dark-blue);">---</span>
                        </div>
                        <div class="col-sm-4">
                            <label class="text-muted small fw-semibold text-uppercase d-block mb-1">Prioridade</label>
                            <span class="badge text-bg-secondary" id="modalPrioridade">---</span>
                        </div>
                        <div class="col-sm-4">
                            <label class="text-muted small fw-semibold text-uppercase d-block mb-1">Status Atual</label>
                            <span class="badge text-bg-secondary" id="modalStatus">---</span>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold text-uppercase d-block mb-1">Cliente / Empresa</label>
                            <span class="fw-semibold" id="modalCliente" style="color: var(--dark-blue);">---</span>
                        </div>
                        <div class="col-md-6">
                            <label class="text-muted small fw-semibold text-uppercase d-block mb-1">Equipamento</label>
                            <span class="fw-semibold text-secondary" id="modalEquipamento">---</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="text-muted small fw-semibold text-uppercase d-block mb-1">Título</label>
                        <span class="fw-bold fs-6 mb-2 d-block" id="modalTitulo" style="color: var(--dark-blue);">---</span>
                        
                        <label class="text-muted small fw-semibold text-uppercase d-block mb-1">Descrição do Problema</label>
                        <div class="bg-white p-3 rounded border small text-secondary fst-italic" id="modalDescricao">---</div>
                    </div>

                    <div class="border-top pt-4">
                        <h6 class="text-uppercase fw-bold mb-3" style="color: var(--dark-blue); font-size: 13px;"><i class="fa-solid fa-pen-to-square me-1"></i> Ações Operacionais</h6>
                        <div class="row g-2">
                            <div class="col-md-6">
                                <select class="form-select" id="atualizarStatus">
                                    <option value="EM_ANDAMENTO">Em Andamento (Na fila)</option>
                                    <option value="FINALIZADO">Concluir Chamado</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <button type="button" class="btn btn-primary w-100 fw-semibold" id="btnSalvarAlteracoes">
                                    <i class="fa-solid fa-check me-1"></i> Atualizar Chamado
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="modal-footer bg-light border-top">
                    <button type="button" class="btn btn-outline-secondary fw-semibold w-100" data-bs-dismiss="modal">Fechar Visualização</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnMenuMobile = document.getElementById('btnMenuMobile');
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('overlayMenuMobile');

            if (btnMenuMobile && sidebar && overlay) {
                function toggleMenu() {
                    sidebar.classList.toggle('show-mobile');
                    overlay.classList.toggle('active');
                }
                btnMenuMobile.addEventListener('click', toggleMenu);
                overlay.addEventListener('click', toggleMenu);
            }
        });
    </script>

    <script src="../js/tecnicoMeusChamados.js"></script>
</body>
</html>
