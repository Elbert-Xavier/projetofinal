<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestoretech - Meu Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/ClientePerfil.css">
    <script type="text/javascript" src="../js/ClientePerfil.js"></script>
</head>
<body>

    <div class="d-flex h-100 vh-100 overflow-hidden">
        
        <aside class="sidebar bg-white d-flex flex-column p-4 border-end">
            <div class="logo d-flex align-items-center gap-3 mb-4 ps-2">
                <span class="logo-box">G</span>
                <h2 class="h6 mb-0 fw-bold">Gestoretech</h2>
            </div>
            
            <nav class="nav flex-column gap-2 h-100">
                <a href="http://localhost:8000/html/ClientePerfil.html" class="nav-link active rounded-3 px-3 py-2.5"><i class="fa-regular fa-user me-3"></i> Perfil</a>
                <a href="http://localhost:8000/html/CadastroChamado.html" class="nav-link text-secondary rounded-3 px-3 py-2.5"><i class="fa-solid fa-plus me-3"></i> Novo Chamado</a>
                <a href="http://localhost:8000/html/clienteMeusChamados.html" class="nav-link text-secondary rounded-3 px-3 py-2.5"><i class="fa-regular fa-file-lines me-3"></i> Meus Chamados</a>
                <a href="http://localhost:8000/html/clienteMeusEquipamentos.html" class="nav-link text-secondary rounded-3 px-3 py-2.5"><i class="fa-solid fa-desktop me-3"></i> Meus Equipamentos</a>
                <a href="http://localhost:8000/login.html" class="nav-link text-secondary rounded-3 px-3 py-2.5 mt-auto"><i class="fa-solid fa-arrow-right-from-bracket me-3"></i> Sair</a>
            </nav>
        </aside>

        <main class="flex-grow-1 p-5 overflow-auto bg-light d-flex justify-content-center align-items-start">
            
            <div class="card w-100 border-0 p-4 rounded-4 shadow-sm" style="max-width: 900px;">
                
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="header-icon d-flex align-items-center justify-content-center rounded-3">
                        <i class="fa-regular fa-user fs-5"></i>
                    </div>
                    <div>
                        <h1 class="h5 mb-1 fw-bold text-dark-blue">Meu Perfil</h1>
                        <p class="text-muted small mb-0">Gerencie suas informações pessoais e credenciais de acesso.</p>
                    </div>
                </div>

                <hr class="text-muted opacity-25 mb-4">

                <form id="formPerfil">
                    <div class="row g-4">
                        
                        <div class="col-12">
                            <h6 class="fw-bold text-dark-blue mb-3"><i class="fa-solid fa-id-card me-2 text-secondary"></i>Informações Profissionais</h6>
                        </div>

                        <div class="col-md-6">
                            <label for="nome" class="form-label text-muted small fw-semibold">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" placeholder="Seu nome" required>
                        </div>

                        <div class="col-md-6">
                            <label for="telefone" class="form-label text-muted small fw-semibold">Telefone / Ramal</label>
                            <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                        </div>

                        <div class="col-md-4">
                            <label for="cargo" class="form-label text-muted small fw-semibold">Cargo</label>
                            <input type="text" class="form-control" id="cargo" placeholder="Ex: Analista de Suporte">
                        </div>

                        <div class="col-md-4">
                            <label for="nivelHierarquico" class="form-label text-muted small fw-semibold">Nível Hierárquico</label>
                            <select class="form-select" id="nivelHierarquico">
                                <option value="Junior">Júnior</option>
                                <option value="Pleno">Pleno</option>
                                <option value="Senior">Sênior</option>
                                <option value="Especialista">Especialista/Gestor</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="dataCadastro" class="form-label text-muted small fw-semibold">Data de Cadastro</label>
                            <input type="date" class="form-control bg-light text-muted" id="dataCadastro" readonly>
                        </div>


                        <div class="col-12 mt-5">
                            <h6 class="fw-bold text-dark-blue mb-3"><i class="fa-solid fa-shield-halved me-2 text-secondary"></i>Segurança e Acesso</h6>
                        </div>

                        <div class="col-md-4">
                            <label for="email" class="form-label text-muted small fw-semibold">E-mail Corporativo</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted"><i class="fa-regular fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" placeholder="nome@empresa.com" required>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="senha" class="form-label text-muted small fw-semibold">Nova Senha</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" class="form-control" id="senha" placeholder="Digite a nova senha">
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="confirmarSenha" class="form-label text-muted small fw-semibold">Confirmar Nova Senha</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-check-double"></i></span>
                                <input type="password" class="form-control" id="confirmarSenha" placeholder="Repita a nova senha">
                            </div>
                        </div>

                    </div>

                    <div class="d-flex justify-content-end align-items-center gap-3 mt-5 pt-4 border-top">
                        <button type="button" class="btn btn-outline-secondary px-4 py-2 fw-semibold rounded-3">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-purple px-4 py-2 fw-semibold rounded-3">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Salvar Alterações
                        </button>
                    </div>
                </form>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
