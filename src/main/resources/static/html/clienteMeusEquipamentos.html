<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestoretech - Meus Equipamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/clienteMeusEquipamentos.css">
    <script type="text/javascript" src="../js/clienteMeusEquipamentos.js"></script>
</head>
<body>

    <div class="d-flex h-100 vh-100 overflow-hidden">
        
        <aside class="sidebar bg-white d-flex flex-column p-4 border-end">
            <div class="logo d-flex align-items-center gap-3 mb-4 ps-2">
                <span class="logo-box">G</span>
                <h2 class="h6 mb-0 fw-bold">Gestoretech</h2>
            </div>
            
            <nav class="nav flex-column gap-2 h-100">
                <a href="http://localhost:8000/html/ClientePerfil.html" class="nav-link text-secondary rounded-3 px-3 py-2.5" id="CadastrarUsuario"><i class="fa-regular fa-user me-3"></i> Usuários</a>
                <a href="http://localhost:8000/html/CadastroChamado.html" class="nav-link text-secondary rounded-3 px-3 py-2.5"><i class="fa-solid fa-plus me-3"></i> Novo Chamado</a>
                <a href="http://localhost:8000/html/clienteMeusChamados.html" class="nav-link text-secondary rounded-3 px-3 py-2.5"><i class="fa-regular fa-file-lines me-3"></i> Meus Chamados</a>
                <a href="http://localhost:8000/html/clienteMeusEquipamentos.html" class="nav-link active rounded-3 px-3 py-2.5"><i class="fa-solid fa-desktop me-3"></i> Meus Equipamentos</a>
                <a href="http://localhost:8000/login.html" class="nav-link text-secondary rounded-3 px-3 py-2.5 mt-auto"><i class="fa-solid fa-arrow-right-from-bracket me-3"></i> Sair</a>
            </nav>
        </aside>

        <main class="flex-grow-1 p-5 overflow-auto bg-light d-flex justify-content-center align-items-start">
            
            <div class="card w-100 border-0 p-4 rounded-4 shadow-sm" style="max-width: 900px;">
                
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="header-icon d-flex align-items-center justify-content-center rounded-3">
                        <i class="fa-solid fa-desktop fs-5"></i>
                    </div>
                    <div>
                        <h1 class="h5 mb-1 fw-bold text-dark-blue">Meus Equipamentos</h1>
                        <p class="text-muted small mb-0">Clique em um equipamento para ver os detalhes completos.</p>
                    </div>
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white text-muted border-end-0 font-sm"><i class="fa-solid fa-filter"></i></span>
                            <select class="form-select border-start-0 ps-1 py-2" id="filtroCriterio">
                                <option value="modelo" selected>Modelo</option>
                                <option value="nome">Nome</option>
                                <option value="serie">Número de Série</option>
                                <option value="fabricante">Fabricante</option>
                                <option value="tipo">Tipo do Equipamento</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="input-group">
                            <span class="input-group-text bg-white text-muted border-end-0 font-sm"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input type="text" class="form-control border-start-0 ps-1 py-2" id="filtroBusca" placeholder="Digite aqui para buscar...">
                        </div>
                    </div>
                </div>

                <div class="list-group d-flex flex-column gap-3 border-0" id="tabelaEquipamento">
                    <div class="text-center text-muted p-4">
                        <i class="fa-solid fa-circle-notch fa-spin me-2"></i> Carregando seus equipamentos...
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div class="modal fade" id="equipmentModal" tabindex="-1" aria-labelledby="equipmentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 px-4 pt-4">
                    <h5 class="modal-title fw-bold text-dark-blue" id="equipmentModalLabel">Detalhes do Equipamento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row g-4">
                        <div class="col-md-5">
                            <div class="img-container bg-light rounded-3 d-flex align-items-center justify-content-center p-3 h-100" style="min-height: 200px;">
                                <img id="imagemEquipamento" alt="Foto do Equipamento" class="img-fluid rounded-2" src="">
                            </div>
                        </div>
                        <div class="col-md-7">
                            <div class="row gy-3">
                                <div class="col-6">
                                    <label class="text-muted small d-block">Tipo Equipamento</label>
                                    <span class="fw-semibold text-dark-blue" id="tipoEquipamento">---</span>
                                </div>
                                <div class="col-6">
                                    <label class="text-muted small d-block">Fabricante</label>
                                    <span class="fw-semibold text-dark-blue" id="fabricante">---</span>
                                </div>
                                <div class="col-12">
                                    <label class="text-muted small d-block">Modelo</label>
                                    <span class="fw-semibold text-dark-blue" id="modelo">---</span>
                                </div>
                                <div class="col-6">
                                    <label class="text-muted small d-block">Número de Série</label>
                                    <span class="fw-semibold text-dark-blue text-uppercase" id="numeroSerie">---</span>
                                </div>
                                <div class="col-6">
                                    <label class="text-muted small d-block">Data de Cadastro</label>
                                    <span class="fw-semibold text-dark-blue" id="dataCadastro">---</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 pb-4">
                    <button type="button" class="btn btn-light-gray rounded-3 fw-semibold" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
