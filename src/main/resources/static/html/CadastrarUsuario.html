<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor&amp;Tech - Meu Perfil</title>
    
    <!-- 1. Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 2. Ícones e Bootstrap -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <!-- 3. Nossos Estilos -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/cliente.css">
    <script type="text/javascript" src="../js/CadastrarUsuario.js"></script>
</head>
<body>

    <div class="dashboard-container" id="pageContainer">
        
        <!-- Sidebar Padronizada (Base.css) -->
        <aside class="sidebar">
            <div class="logo-area">
                <img src="../assets/logo-icon.png" alt="Gestor&amp;Tech" class="logo-box">
                <div class="logo-title-group">
                    <span class="logo-text">Gestor&amp;Tech</span>
                    <span class="logo-subtext">Área do Cliente</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="CadastrarUsuario.html" class="nav-item active"><i class="fa-regular fa-user"></i> Perfil</a>
                <a href="CadastroChamado.html" class="nav-item"><i class="fa-solid fa-plus"></i> Novo Chamado</a>
                <a href="clienteMeusChamados.html" class="nav-item"><i class="fa-regular fa-file-lines"></i> Meus Chamados</a>
                <a href="clienteMeusEquipamentos.html" class="nav-item"><i class="fa-solid fa-desktop"></i> Meus Equipamentos</a>
                
                <div class="sidebar-footer">
                    <a href="../login.html" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
                </div>
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            
            <!-- CABEÇALHO MOBILE -->
            <div class="d-flex d-lg-none align-items-center justify-content-between bg-white border-bottom p-3 w-100 shadow-sm">
                <div class="d-flex align-items-center gap-2">
                    <img src="../assets/logo-icon.png" alt="Logo" style="width: 32px; height: 32px;">
                    <span class="fw-bold" style="color: var(--dark-blue);">Gestor&amp;Tech</span>
                </div>
                <button class="btn btn-light border-0" id="btnMenuMobile">
                    <i class="fa-solid fa-bars fs-4" style="color: var(--dark-blue);"></i>
                </button>
            </div>

            <!-- OVERLAY MOBILE -->
            <div class="sidebar-overlay" id="overlayMenuMobile"></div>

            <div class="content-wrapper p-4 p-md-5">
                <div class="card w-100 border-0 p-4 p-md-5 rounded-4 shadow-sm mx-auto" style="max-width: 900px;">
                    
                    <!-- Cabeçalho da Página -->
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="d-flex align-items-center justify-content-center rounded-circle" style="width: 46px; height: 46px; background-color: var(--bs-primary-bg-subtle, #eaedfe); color: var(--bs-primary);">
                            <i class="fa-regular fa-user fs-5"></i>
                        </div>
                        <div>
                            <h1 class="h4 mb-1 fw-bold" style="color: var(--dark-blue);">Meu Perfil</h1>
                            <p class="text-muted small mb-0">Gerencie suas informações pessoais e credenciais de acesso.</p>
                        </div>
                    </div>

                    <hr class="text-muted opacity-25 mb-5">

                    <!-- Formulário de Perfil -->
                    <form id="formPerfil">
                        <div class="row g-4">
                            
                            <div class="col-12">
                                <h6 class="fw-bold mb-2" style="color: var(--dark-blue);">
                                    <i class="fa-solid fa-id-card me-2 text-muted"></i>Informações Profissionais
                                </h6>
                            </div>

                            <div class="col-md-6">
                                <label for="nome" class="form-label text-muted small fw-semibold mb-1">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" placeholder="Seu nome" required>
                            </div>

                            <div class="col-md-6">
                                <label for="telefone" class="form-label text-muted small fw-semibold mb-1">Telefone / Ramal</label>
                                <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                            </div>

                            <div class="col-md-4">
                                <label for="cargo" class="form-label text-muted small fw-semibold mb-1">Cargo</label>
                                <input type="text" class="form-control" id="cargo" placeholder="Ex: Analista de Suporte">
                            </div>

                            <div class="col-md-4">
                                <label for="nivelHierarquico" class="form-label text-muted small fw-semibold mb-1">Nível Hierárquico</label>
                                <select class="form-select" id="nivelHierarquico">
                                    <option value="Junior">Júnior</option>
                                    <option value="Pleno">Pleno</option>
                                    <option value="Senior">Sênior</option>
                                    <option value="Especialista">Especialista/Gestor</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label for="dataCadastro" class="form-label text-muted small fw-semibold mb-1">Data de Cadastro</label>
                                <input type="date" class="form-control bg-light text-muted" id="dataCadastro" readonly>
                            </div>

                            <div class="col-12 mt-5">
                                <h6 class="fw-bold mb-2" style="color: var(--dark-blue);">
                                    <i class="fa-solid fa-shield-halved me-2 text-muted"></i>Segurança e Acesso
                                </h6>
                            </div>

                            <div class="col-md-4">
                                <label for="email" class="form-label text-muted small fw-semibold mb-1">E-mail Corporativo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white text-muted"><i class="fa-regular fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="nome@empresa.com" required>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="senha" class="form-label text-muted small fw-semibold mb-1">Nova Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control" id="senha" placeholder="Digite a nova senha">
                                </div>
                            </div>

                            <div class="col-md-4">
                                <label for="confirmarSenha" class="form-label text-muted small fw-semibold mb-1">Confirmar Nova Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white text-muted"><i class="fa-solid fa-check-double"></i></span>
                                    <input type="password" class="form-control" id="confirmarSenha" placeholder="Repita a nova senha">
                                </div>
                            </div>

                        </div>

                        <!-- Ações do Formulário -->
                        <div class="d-flex flex-column-reverse flex-sm-row justify-content-end align-items-center gap-3 mt-5 pt-4 border-top">
                            <button type="button" class="btn btn-outline-secondary px-4 py-2 fw-semibold rounded-3 w-100 w-sm-auto">
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-purple px-4 py-2 fw-semibold rounded-3 w-100 w-sm-auto">
                                <i class="fa-solid fa-floppy-disk me-2"></i>Salvar Alterações
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPT MOBILE INTERNO -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btnMenuMobile = document.getElementById('btnMenuMobile');
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('overlayMenuMobile');

            if (btnMenuMobile && sidebar && overlay) {
                function toggleMenu() {
                    sidebar.classList.toggle('show-mobile');
                    overlay.classList.toggle('active');
                }
                btnMenuMobile.addEventListener('click', toggleMenu);
                overlay.addEventListener('click', toggleMenu);
            }
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
